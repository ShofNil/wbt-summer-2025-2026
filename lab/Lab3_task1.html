<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Student Registration Form </title>
</head>
<body>
    <header>
        <h1>Student Registration Form </h1>
    </header>
    <main>
        <form action="#" method="post">
            <fieldset>
            <legend>Personal Information</legend>
            <label for="fullname">Full Name:</label>
            <input type="text" name="fullname" id="fullname" placeholder="Enter your full name" required>
            <br><br>
            <label for="student_id">Student ID:</label>
            <input type="text" name="student_id" id="student_id" placeholder="Enter your student ID" required>
            <br><br>
            <label for="email">Email Address:</label>
            <input type="email" name="email" id="email" placeholder="Enter your email address" required>
            <br><br>
            <label for="phone">Phone Number:</label>
            <input type="tel" name="phone" id="phone" placeholder="Enter your phone number" required>
            <br><br>
            <label for="dob">Date of Birth:</label>
            <input type="date" name="dob" id="dob" required>
            <br><br>

            <label>Gender:</label>
            <br>

            <input type="radio" name="gender" id="male" value="Male" required>
            <label for="male">Male</label>
            <br>
            <input type="radio" name="gender" id="female" value="Female">
            <label for="female">Female</label>
            <br>
            <input type="radio" name="gender" id="other" value="Other">
            <label for="other">Other</label>
            <br><br>
            </fieldset>

            <br>

            <fieldset>
                <legend>Academic Information</legend>

                <label for="department">Department:</label>
                <select name="department" id="department" required>
                    <option value="CSE" selected>CSE</option>
                    <option value="EEE">EEE</option>
                    <option value="BBA">BBA</option>
                    <option value="English">English</option>
                    <option value="Civil Engineering">Civil Engineering</option>
                </select>
                <br><br>


                <label for="semester">Semester:</label>
                <select name="semester" id="semester" required>
                    <option value="">Select your semester</option>
                    <option value="1st Semester">1st Semester</option>
                    <option value="2nd Semester">2nd Semester</option>
                    <option value="3rd Semester">3rd Semester</option>
                    <option value="4th Semester">4th Semester</option>
                    <option value="5th Semester">5th Semester</option>
                    <option value="6th Semester">6th Semester</option>
                    <option value="7th Semester">7th Semester</option>
                    <option value="8th Semester">8th Semester</option>
                </select>
                <br><br>

            </fieldset>
            <br>
            <fieldset>
                <legend>Skills</legend>
                <label>Select Programming Languages Known: </label>
                <br><br>
                <input type="checkbox" name="language" id="c" value="C">
                <label for="c">C</label>
                <br>
                <input type="checkbox" name="language" id="cpp" value="C++">
                <label for="cpp">C++</label>
                <br>
                <input type="checkbox" name="language" id="java" value="Java">
                <label for="java">Java</label>
                <br>
                <input type="checkbox" name="language" id="python" value="Python">
                <label for="python">Python</label>
                <br>
                <input type="checkbox" name="language" id="javascript" value="JavaScript">
                <label for="javascript">JavaScript</label>
                <br><br>


            </fieldset>


            <br>
            <fieldset>
                <legend>Additional Information</legend>
                <label for="address">Address:</label>
                <br>
                <textarea name="address" id="address" rows="4" cols="40" placeholder="Enter your address" required></textarea>
            
                <br><br>
                <label for="photo">Upload Student Photo:</label>
                <input type="file" name="photo" id="photo" accept="image/*" required>
                <br><br>

                <label for="comments">Comments/Suggestions:</label>
                <br>
                <textarea name="comments" id="comments" rows="4" cols="40" maxlength="200" placeholder="Write your comments within 200 characters"></textarea>
                <br><br>
                <input type="submit" value="Suubmit">
                <input type="reset" value="Reset">


            </fieldset>




        </form>
    </main>

    <footer>
        <p>Copywrite  <br>
        all credit goes to shofnil.
        </p>
    </footer>
</body>
</html>
